openapi: "3.1.0"
info:
  title: "Quant Lab API"
  version: "0.1.0"
  description: |
    Quant Lab 백엔드 API 사양 (V3 Phase 1 MVP).

    이 파일은 OpenAPI-first 정책에 따라 라우트 구현보다 먼저 갱신된다.
    현재 본 초안에는 `GET /api/health` 와 cross-endpoint 공통 스키마만 포함되어 있다.
    자산 / 백테스트 엔드포인트는 TASK-061, TASK-062 에서 본 파일에 추가된다.

    모든 4xx/5xx 응답은 `components/schemas/ErrorResponse` 형태로 통일된다
    (architecture.md V2 § "에러 응답 계약" 참조).
servers:
  - url: http://localhost:8001
    description: 로컬 개발 (.env BACKEND_PORT 디폴트 8001)
paths:
  /api/health:
    get:
      tags: [health]
      summary: Liveness check
      description: 백엔드가 살아있는지와 배포된 버전을 반환한다.
      operationId: getHealth
      responses:
        "200":
          description: 정상
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                version: "0.1.0"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok]
          description: 서비스 상태. 살아있으면 항상 'ok'.
        version:
          type: string
          description: 백엔드 패키지 버전 (`app.__version__`).

    ErrorDetail:
      type: object
      required: [stage, type, message, request_ctx, trace_id]
      properties:
        stage:
          type: string
          description: 에러가 발생한 처리 단계 (예 'validation', 'resolve_universe', 'internal').
        type:
          type: string
          description: 원본 예외 클래스명.
        message:
          type: string
          description: 사용자에게 노출 가능한 한국어 메시지.
        request_ctx:
          type: object
          additionalProperties: true
          description: 요청 식별용 컨텍스트 (path/method/query 등).
        trace_id:
          type: string
          description: 요청별 trace UUID. 서버 로그와 교차 조회용.

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"
      example:
        error:
          stage: validation
          type: RequestValidationError
          message: "요청 본문/쿼리가 스키마를 만족하지 않습니다."
          request_ctx:
            path: /api/backtests
            method: POST
            query: {}
          trace_id: "9f0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d"

    PaginatedResponse:
      type: object
      description: |
        리스트 엔드포인트 공통 wrapper. 실제 사용 시 `items` 의 element schema 는
        구체 endpoint 정의에서 `allOf` 로 좁혀 사용한다 (TASK-061/062).
      required: [items, total, page, page_size]
      properties:
        items:
          type: array
          items: {}
        total:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
