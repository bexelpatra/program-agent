services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: stock-backtest-db
    environment:
      POSTGRES_USER: stock
      POSTGRES_PASSWORD: stock
      POSTGRES_DB: stock_backtest
    ports:
      - "5432:5432"
    volumes:
      - stock_backtest_pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock -d stock_backtest"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  stock_backtest_pgdata:
