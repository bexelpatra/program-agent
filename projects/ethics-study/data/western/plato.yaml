- id: plato-claim-012
  thinker_id: plato
  work_id: plato-politeia
  source_detail: 국가 제5권 476e–480a; 제6권 507a–b (메텍시스/분유)
  claim: 감각 세계의 개별 사물들은 이데아에 '참여(메텍시스, 분유)'함으로써 그 이데아의 속성을 불완전하게 가진다.
  original_text: ''
  explanation: 아름다운 꽃은 '아름다움의 이데아'에 참여함으로써 아름답다. 이 관계를 플라톤은 메텍시스(분유/관여)라 부른다. 이데아는
    하나(일자적 보편)이지만, 개별 사물들은 이데아에 참여하는 정도에 따라 그 속성을 더 많거나 적게 가진다.
  argument: '전제1: 아름다운 것들은 다양하지만 모두 ''아름답다''는 동일한 속성을 가진다. 전제2: 이 공통 속성의 근거는 개별 사물들
    안에 있을 수 없다(각각 불완전하고 변화하므로). 전제3: 따라서 ''아름다움 자체(이데아)''가 별도로 존재하며, 개별 사물들은 이것에 참여함으로써
    아름답다. 결론: 개별-보편의 관계는 메텍시스(분유)로 설명된다.'
  counterpoint: 아리스토텔레스는 '형이상학' 제1권 9장에서 '참여'라는 개념이 빈 말에 불과하다고 비판했다. 개별 사물이 이데아에 '참여'한다는
    것이 구체적으로 어떤 관계인지 플라톤은 충분히 설명하지 못했으며, 이데아를 분리된 독립적 존재로 설정하면 개별-보편의 관계가 더 불분명해진다고
    주장했다.
  context: 이데아와 감각 세계의 개별 사물들 사이의 관계를 설명하기 위해 메텍시스 개념을 도입했다.
  keywords:
  - 메텍시스
