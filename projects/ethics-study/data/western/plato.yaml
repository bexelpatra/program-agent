thinker:
  id: plato
  name: 플라톤
  name_en: Plato
  field: western_ethics
  era: 고대 그리스
  birth_year: -428
  death_year: -348
  background: 아테네 귀족 가문 출신으로, 어머니는 솔론의 후예로 알려진다. 청년기에 소크라테스를 만나 그의 죽음(기원전 399년)까지
    사사했다. 소크라테스 사후 메가라로 피신하였고, 세 차례에 걸친 시칠리아(시라쿠사) 여행에서 디오니시오스 1세·2세와 대립하며 철인왕 사상을
    실험하려 했으나 실패했다. 기원전 387년경 아테네로 돌아와 아카데메이아를 설립하였으며, 이 학원은 서양 최초의 고등교육기관으로 기원후 529년까지
    존속했다. 아리스토텔레스는 약 20년간 이 아카데메이아에서 수학했다.
  core_philosophy: 감각 세계 너머에 영원불변하는 참된 실재인 이데아(Idea/Eidos)가 존재한다고 주장했다. 이데아 중 최고는
    '선의 이데아'로, 태양이 가시적 세계에서 하듯 지성적 세계에서 모든 것을 가능하게 한다. 영혼은 이성(로기스티콘)·기개(티모에이데스)·욕구(에피티메티콘)의
    삼분 구조를 가지며, 이성이 기개와 욕구를 다스릴 때 영혼의 정의(디카이오쉬네)가 실현된다. 학습은 영혼이 전생에 보았던 이데아를 상기(아나무네시스)하는
    과정이며, 철학자만이 이데아의 세계를 직관할 수 있으므로 철학자가 통치해야 한다(철인왕 사상). 에로스는 아름다운 몸 → 아름다운 영혼 →
    아름다운 행위 → 선의 이데아로 상승하는 원동력이다.
  philosophical_journey: '소크라테스의 영향으로 덕과 영혼 탐구를 시작했다(초기: 변론·크리톤·에우티프론 등). 중기에는 이데아론을
    본격 전개하며 메논의 상기설, 파이돈의 영혼불멸, 국가의 동굴의 비유·철인왕 사상을 정립했다. 시칠리아 여행 실패 후에도 철인왕 사상의 이론적
    토대를 다졌다. 후기(파르메니데스·소피스트·티마이오스·법률)에서는 이데아론을 자기 비판하고, 수학적 원리와 코스모스 생성론을 전개했으며, ''법률''에서는
    철인왕 대신 법치(법의 지배)로 이상을 수정했다.'
  keywords:
  - 이데아
  - 동굴의 비유
  - 영혼삼분설
  - 철인왕
  - 선의 이데아
  - 아나무네시스
  - 에로스
works:
- id: plato-symposion
  thinker_id: plato
  title: 향연
  title_original: Symposion
  year: -385
  significance: 에로스(사랑)의 본질을 다양한 연사들이 논하는 대화편. 소크라테스가 전달하는 디오티마의 연설에서 에로스가 아름다운 몸에서
    출발하여 선의 이데아로 상승하는 과정('아름다움의 사다리')이 제시된다.
  key_concepts:
  - 에로스
  - 아름다움의 사다리
  - 선의 이데아
  - 디오티마
- id: plato-menon
  thinker_id: plato
  title: 메논
  title_original: Menon
  year: -385
  significance: 덕이 가르칠 수 있는 것인지를 논하는 대화편. 기하학 노예 소년 실험을 통해 아나무네시스(상기설)를 논증하며, '덕은
    올바른 의견'이라는 잠정 결론을 제시한다.
  key_concepts:
  - 아나무네시스
  - 덕의 교육 가능성
  - 올바른 의견
  - 덕과 지식
- id: plato-phaidon
  thinker_id: plato
  title: 파이돈
  title_original: Phaidon
  year: -380
  significance: 소크라테스의 임종 직전 대화를 기록한 대화편. 영혼불멸을 논증하는 네 가지 논변(순환 논변, 상기 논변, 친화성 논변,
    형상 논변)이 제시되며, 이데아론과 아나무네시스 이론의 핵심 근거가 된다.
  key_concepts:
  - 영혼불멸
  - 아나무네시스
  - 이데아
  - 영혼과 육체의 이분법
- id: plato-politeia
  thinker_id: plato
  title: 국가
  title_original: Politeia
  year: -375
  significance: 플라톤의 대표작. 이데아론·동굴의 비유·태양의 비유·선분의 비유를 통해 지식론과 존재론을 전개하며, 영혼삼분설에 기초한
    정의론과 철인왕 사상을 제시한다. 이상 국가의 교육 체계와 시인 추방론도 이 저서에서 논의된다.
  key_concepts:
  - 이데아
  - 동굴의 비유
  - 선분의 비유
  - 영혼삼분설
  - 철인왕
  - 4덕론
  - 정의론
  - 시인 추방론
- id: plato-phaidros
  thinker_id: plato
  title: 파이드로스
  title_original: Phaidros
  year: -370
  significance: 에로스와 영혼의 관계, 수사술의 진정한 의미를 논한다. 영혼을 두 말과 마부로 비유한 '영혼의 마차 비유'를 통해 영혼삼분설을
    형상화하고, 철학적 에로스가 영혼을 이데아의 세계로 이끈다고 설명한다.
  key_concepts:
  - 에로스
  - 영혼의 마차 비유
  - 영혼삼분설
  - 수사술
- id: plato-timaios
  thinker_id: plato
  title: 티마이오스
  title_original: Timaios
  year: -360
  significance: 데미우르고스(장인신)가 이데아를 모범으로 삼아 코스모스를 창조하는 과정을 서술하는 우주론. 플라톤 자연철학의 정수로,
    코라(공간/장소), 4원소론, 영혼의 기원을 다룬다.
  key_concepts:
  - 데미우르고스
  - 코스모스 생성론
  - 코라
  - 이데아와 모방
- id: plato-philebos
  thinker_id: plato
  title: 필레보스
  title_original: Philebos
  year: -355
  significance: 쾌락과 지식 중 어느 것이 좋은 삶의 요소인지를 탐구한다. 순수한 쾌락과 혼합된 쾌락을 구분하고, 좋은 삶은 지식과 적절한
    쾌락의 혼합임을 논증한다.
  key_concepts:
  - 쾌락
  - 지식
  - 좋은 삶
  - 혼합
- id: plato-nomoi
  thinker_id: plato
  title: 법률
  title_original: Nomoi
  year: -347
  significance: 플라톤 최후의 대작. 철인왕 이상을 포기하고 법에 의한 지배(법치)를 차선으로 제시한다. 교육, 혼인, 재산, 종교 등
    현실적 입법 문제를 상세히 다루며, 국가보다 현실적이고 실용적인 정치철학을 보여준다.
  key_concepts:
  - 법치
  - 차선의 이상국가
  - 혼합정체
  - 교육과 덕
claims:
- id: plato-claim-001
  thinker_id: plato
  work_id: plato-politeia
  source_detail: 국가 제6~7권, 507b–521b (태양·선분·동굴의 비유)
  claim: 감각으로 지각되는 사물들은 참된 실재가 아니며, 이데아(형상)만이 영원불변하는 참된 실재이다.
  original_text: ''
  explanation: 플라톤은 세계를 '가시적 세계(감각계)'와 '지성적 세계(이데아계)'로 이분한다. 아름다운 꽃들은 시들지만 '아름다움의
    이데아'는 불변한다. 진정한 인식(에피스테메)은 이데아에 대한 것이며, 감각에 기초한 것은 의견(독사)에 불과하다.
  argument: '전제1: 감각 대상들은 끊임없이 변화하며(생성·소멸), 상반된 속성을 동시에 가진다(예: 같은 막대기가 물속에서는 굽어 보임).
    전제2: 참된 인식의 대상은 불변하고 일관된 것이어야 한다. 전제3: 변화하는 대상에서는 참된 인식이 불가능하며, 오직 의견만이 가능하다.
    결론: 따라서 참된 인식의 대상인 이데아는 감각 세계 너머에 별도로 존재해야 한다.'
  counterpoint: 아리스토텔레스는 '형이상학' 제1권 및 제13권에서 이데아론을 비판했다. 보편자(이데아)가 개별 사물과 분리되어 독립적으로
    존재한다면, 개별 사물과 이데아 사이를 설명하기 위해 또 다른 중간 존재가 필요해지는 '제3인간 논변'이 발생한다고 지적했다. 또한 이데아는
    사물들의 존재와 운동을 설명하지 못하며, 실체는 개별 사물 안에 내재한다고 주장했다.
  context: 소피스트들의 상대주의를 반박하고 보편적 진리의 토대를 마련하기 위해 이데아론을 전개했다.
  keywords:
  - 이데아
  - 가시적 세계
  - 지성적 세계
  - 에피스테메
  - 독사
  verified: false
  verification_log: []
- id: plato-claim-002
  thinker_id: plato
  work_id: plato-politeia
  source_detail: 국가 제7권, 514a–521b (동굴의 비유)
  claim: 동굴에 갇힌 죄수처럼 인간은 그림자를 실재로 착각하며 살아간다. 철학적 교육을 통해 동굴 밖 태양(선의 이데아)을 직관할 수 있다.
  original_text: ''
  explanation: 동굴 안 죄수들은 벽에 비친 그림자만을 보고 그것이 실재라 믿는다. 사슬에서 풀려나 동굴 밖으로 나온 자는 처음에는 눈이
    부시지만, 결국 태양(선의 이데아)을 직접 볼 수 있게 된다. 이 비유는 철학 교육의 과정과 목표를 상징한다.
  argument: '전제1: 감각 세계에 묶인 인간(죄수)은 이데아를 그림자처럼 왜곡된 형태로만 인식한다. 전제2: 철학적 훈련(변증술, 수학
    등)은 영혼의 방향을 감각에서 이성으로 전환시킨다. 전제3: 선의 이데아는 모든 이데아의 원인이며, 이를 인식한 자만이 진정한 지혜를 갖는다.
    결론: 따라서 철학자만이 선의 이데아를 인식할 수 있으며, 교육은 영혼을 이데아로 돌리는 과정이다.'
  counterpoint: 아리스토텔레스는 '니코마코스 윤리학' 제1권 6장에서, 선의 이데아처럼 분리된 보편적 '선 자체'를 설정하는 것은 실천에
    아무 도움이 되지 않는다고 비판했다. 실제 인간이 추구하는 선은 각 맥락과 실천 속에서 파악되는 것이지, 감각 세계 밖의 추상적 이데아에서
    도출되는 것이 아니라고 주장했다.
  context: 이데아론의 인식론적·교육적 함의를 구체적 비유로 설명하기 위한 맥락에서 제시되었다.
  keywords:
  - 동굴의 비유
  - 선의 이데아
  - 철학 교육
  - 변증술
  verified: false
  verification_log: []
- id: plato-claim-003
  thinker_id: plato
  work_id: plato-politeia
  source_detail: 국가 제6권, 508e–509b (태양의 비유)
  claim: 선의 이데아는 이데아 세계의 최고 원리이며, 태양이 가시적 세계에서 빛과 생명을 주듯 지성적 세계에서 인식과 존재의 근거가 된다.
  original_text: ''
  explanation: 플라톤은 선의 이데아를 태양에 비유한다. 태양이 눈에게 빛을 주고 사물이 보이게 하듯, 선의 이데아는 지성(누스)에게 인식
    능력을 주고 이데아들이 인식되게 한다. 또한 태양이 사물의 생성과 성장을 가능하게 하듯, 선의 이데아는 다른 이데아들의 존재(본질)와 인식
    가능성의 근거이다.
  argument: '전제1: 이데아는 지성에 의해 인식되며, 인식 행위에는 인식 주체·인식 대상·인식을 가능하게 하는 조건이 필요하다. 전제2:
    가시적 세계에서 태양이 눈과 사물을 매개하듯, 지성적 세계에서도 동일한 역할을 하는 최고 원리가 있어야 한다. 전제3: 그 최고 원리가 선의
    이데아이며, 이것은 다른 모든 이데아의 존재와 인식 가능성의 원인이다. 결론: 선의 이데아는 이데아 세계 전체의 최고 원리이자 목적이다.'
  counterpoint: 플로티노스(엔네아데스 I~VI)는 플라톤의 선의 이데아를 계승하여 '일자(一者, to hen)'로 발전시켰으나, 아리스토텔레스는
    '니코마코스 윤리학' 제1권 6장 및 '형이상학' 제1권에서 선의 이데아처럼 단일한 보편적 선을 설정하는 것은 다양한 범주에 걸쳐 있는 선을
    하나의 이데아로 환원할 수 없다는 점에서 불가능하다고 비판했다.
  context: 인식론과 존재론을 연결하는 최고 원리를 확립하기 위해 제시한 비유.
  keywords:
  - 선의 이데아
  - 태양의 비유
  - 인식론
  - 최고 원리
  verified: false
  verification_log: []
- id: plato-claim-004
  thinker_id: plato
  work_id: plato-politeia
  source_detail: 국가 제4권, 436a–441c; 제9권, 580d–581e (영혼삼분설)
  claim: 인간의 영혼은 이성(로기스티콘), 기개(티모에이데스), 욕구(에피티메티콘)의 세 부분으로 구성된다.
  original_text: ''
  explanation: 이성은 지혜를 사랑하며 전체의 유익을 위해 판단한다. 기개는 명예를 추구하며 이성의 편에서 욕구를 통제하는 역할을 한다.
    욕구는 식욕·성욕 등 감각적 쾌락을 추구한다. 세 부분의 갈등과 조화는 국가의 세 계층(통치자·수호자·생산자)에 대응한다.
  argument: '전제1: 동일한 주체가 동시에 동일한 대상에 대해 욕구와 혐오를 동시에 가질 수 있다(예: 목마르지만 오염된 물을 마시기 싫음).
    전제2: 동일한 것이 동일한 측면에서 동시에 상반된 상태에 있을 수는 없다(모순율). 전제3: 따라서 그 상반된 상태들은 영혼의 다른 부분에서
