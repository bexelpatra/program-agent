- id: plato-claim-011
  thinker_id: plato
  work_id: plato-phaidon
  source_detail: 파이돈 72e–77a (상기 논변), 78b–84b (친화성 논변)
  claim: 영혼은 불멸하며, 죽음은 영혼이 육체로부터 해방되어 이데아의 세계로 돌아가는 것이다. 철학은 죽음의 연습이다.
  original_text: ''
  explanation: '파이돈에서 소크라테스는 영혼불멸을 여러 논변으로 입증한다. 상기 논변: 우리가 동등한 것들을 보고 ''동등함 자체''를
    떠올리는 것은 영혼이 태어나기 전에 이데아를 알았음을 증명한다. 친화성 논변: 영혼은 불변·단순·불멸하는 이데아와 친화적이므로, 육체와 달리
    분해되지 않는다. 철학자는 육체적 쾌락을 절제하고 이성으로 이데아를 탐구하는 삶, 즉 ''죽음의 연습''을 한다.'
  argument: '전제1: 이데아(동등함 자체, 아름다움 자체 등)는 불변·단순·불멸하다. 전제2: 영혼은 이데아를 인식하며, 그 속성에서 이데아와
    유사하다(친화성). 전제3: 유사한 것은 유사한 속성을 공유하는 경향이 있다. 결론: 따라서 영혼도 이데아처럼 불멸하며, 육체 소멸 후에도
    지속된다.'
  counterpoint: 케베스(파이돈 내 등장인물)는 영혼이 육체보다 오래 살더라도 궁극적으로 소진될 수 있다고 반박했다. 에피쿠로스는 '메노이케우스에게
    보내는 편지'에서 영혼도 원자로 구성되어 있으며 죽음과 함께 분산된다고 주장하여 영혼불멸론을 거부했다.
  context: 임박한 처형 앞에서 소크라테스가 죽음의 두려움 없이 평온한 이유를 제자들에게 설명하기 위해 논증했다.
