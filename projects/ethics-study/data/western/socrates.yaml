keywords:
- id: socrates-kw-001
  term: 무지의 지
  term_en: Socratic ignorance
  definition: '자신이 모른다는 사실을 아는 것. 소크라테스는 참된 지혜의 출발점이 자신의 무지를 자각하는 데 있다고 보았다. 지혜롭다고
    자처하는 사람들은 실제로는 모르면서 안다고 착각하지만, 소크라테스는 적어도 자신이 모른다는 것을 알고 있다는 점에서 더 지혜롭다.

    '
  thinker_id: socrates
  work_id: socrates-apologia
