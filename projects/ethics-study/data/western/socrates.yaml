  - 무지의 지
- id: socrates-kw-003
  term: 지행합일
  term_en: Socratic intellectualism
  definition: '덕(아레테)은 곧 지식(에피스테메)이라는 소크라테스의 주지주의적 테제. 선이 무엇인지 진정으로 아는 사람은 반드시 선을
    행하며, 악행은 선에 대한 무지에서 비롯된다고 본다.

