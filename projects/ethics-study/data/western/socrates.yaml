relations:
- id: socrates-rel-001
  from_thinker: socrates
  to_thinker: plato
  type: influenced
  description: '플라톤은 소크라테스의 제자로, 스승의 문답법과 덕의 탐구를 계승하여 이데아론으로 발전시켰다. 플라톤의 초기 대화편은 소크라테스의
    사상을 비교적 충실히 반영하는 것으로 평가된다.

    '
  evidence: 플라톤의 초기 대화편 전반 (변론, 크리톤, 에우티프론 등)
- id: socrates-rel-002
  from_thinker: socrates
  to_thinker: aristotle
  type: influenced
  description: '아리스토텔레스는 플라톤을 통해 소크라테스의 영향을 간접적으로 받았다. 소크라테스의 "덕은 지식이다" 테제를 비판적으로
    계승하여, 덕은 지식만이 아니라 습관과 실천을 통해 형성된다고 수정했다.

    '
  evidence: 아리스토텔레스, 니코마코스 윤리학 제6권
- id: socrates-rel-003
  from_thinker: socrates
  to_thinker: protagoras
  type: criticized
  description: '소크라테스는 소피스트 프로타고라스의 상대주의("인간이 만물의 척도이다")를 비판하고, 보편적 진리와 객관적 선의 존재를
    주장했다.

    '
  evidence: 플라톤, 프로타고라스; 플라톤, 테아이테토스 152a
- id: socrates-rel-004
  from_thinker: socrates
  to_thinker: sophists
  type: criticized
  description: '소크라테스는 소피스트들이 수사술과 설득의 기술을 가르치면서 덕을 가르칠 수 있다고 주장하는 것을 비판했다. 소피스트들은
    대가를 받고 지혜를 판다고 자처했으나, 소크라테스는 그들이 참된 지혜가 아닌 겉보기 지혜만을 가르친다고 보았다.

    '
  evidence: 플라톤, 프로타고라스; 플라톤, 고르기아스
