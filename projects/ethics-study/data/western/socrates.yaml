- id: socrates-claim-008
  thinker_id: socrates
  work_id: socrates-theaetetus
  source_detail: 테아이테토스 148e-151d
  claim: 나의 기술은 산파술(마이유틱)이다 — 나는 지혜를 낳지 못하지만 남이 낳도록 돕는다
  original_text: ''
  explanation: 소크라테스는 자신의 어머니 파이나레테가 산파였음을 언급하며, 자신도 영혼의 산파술을 행한다고 말한다. 자신은 지혜를 출산하지
    못하지만, 다른 사람의 영혼에서 진리를 이끌어내는 역할을 한다. 문답을 통해 상대방이 스스로 진리를 발견하도록 돕는 방법이다.
  context: 테아이테토스에게 지식이 무엇인지를 물으며, 자신의 문답법이 산파의 기술과 같다고 비유하는 대목.
  argument: 소크라테스의 어머니 파이나레테는 산파로서 아이를 직접 낳지 않고 산모가 아이를 낳도록 돕는다. 소크라테스 자신도 이와 마찬가지로
    대화 상대의 영혼에 진리가 잠들어 있음을 전제하고, 질문을 통해 그것을 스스로 이끌어낼 수 있도록 돕는다. 자신은 지혜를 갖고 있지 않으므로
    아무것도 가르쳐 줄 수 없지만, 상대방이 자신 안에 있는 것을 발견하도록 질문으로 이끈다. 이 방법은 상기설—지식은 외부에서 주입되는 것이
    아니라 영혼이 이미 지닌 것을 다시 떠올리는 것—을 실천하는 것이다. 따라서 진정한 앎은 타인이 대신해 줄 수 없으며, 각자가 산파의 도움을
    받아 스스로 자신의 앎을 출산해야 한다.
  counterpoint: 산파술 비유는 교육의 역할을 지나치게 수동적으로 설정한다는 비판이 있다. 존 듀이는 민주주의와 교육(Democracy
    and Education, 1916)에서, 교육은 단순히 내면의 것을 이끌어내는 것이 아니라 사회적 경험과 능동적 참여를 통해 새로운 지식을
    구성하고 성장하는 과정이라고 보았다. 또한 상기설의 전제—모든 사람의 영혼에 진리가 이미 내재해 있다는 것—는 영혼 불멸과 전생에 대한 형이상학적
    가정에 의존하며, 이를 받아들이지 않는다면 산파술의 토대 자체가 무너진다.
