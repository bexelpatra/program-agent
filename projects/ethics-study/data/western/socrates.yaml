- id: socrates-claim-009
  thinker_id: socrates
  work_id: socrates-phaedo
  source_detail: 파이돈 64a-67e
  claim: 철학은 죽음의 연습이다 — 영혼을 육체로부터 분리하는 것
  original_text: ''
  explanation: 소크라테스는 참된 철학자는 죽음을 두려워하지 않는다고 말한다. 철학이란 영혼을 육체의 욕구로부터 분리하여 순수한 인식에
    도달하려는 활동이며, 죽음은 영혼과 육체의 완전한 분리이므로 철학자에게 두려움의 대상이 아니라 오히려 추구하는 바에 가까운 것이라고 논한다.
  context: 사형 집행일에 제자들과 나누는 대화. 소크라테스가 죽음 앞에서 평온한 이유를 설명하는 맥락.
  argument: 철학자는 진리를 추구하는 사람이다. 진리는 순수한 이성적 인식을 통해 접근 가능하지만, 육체의 감각과 욕구는 이를 방해한다.
    눈과 귀는 착각을 일으키고, 신체의 욕구는 영혼의 집중을 흐트러뜨린다. 따라서 살아있는 동안 철학자는 최대한 영혼을 육체의 영향으로부터 분리하려
    한다. 죽음은 영혼과 육체의 완전한 분리이므로, 이것이 곧 철학자가 평생 추구해온 상태의 완성이다. 그러므로 진정한 철학자는 이미 삶에서 죽음을
    연습하고 있는 것이며, 실제 죽음을 두려워할 이유가 없다. 오히려 죽음을 두려워하는 것은 신체의 쾌락과 안락을 추구하는 삶을 살고 있다는 증거다.
  counterpoint: 이 논변은 육체와 영혼의 이분법, 그리고 영혼 불멸에 대한 믿음을 전제로 한다. 아리스토텔레스는 영혼론(De Anima,
    제2권)에서 영혼을 신체의 형상(forma)으로 보았다. 영혼은 신체 없이 독립적으로 존재하는 실체가 아니라 살아있는 신체가 갖는 현실태이므로,
    신체와 영혼의 완전한 분리는 곧 존재의 소멸을 의미할 뿐이다. 에피쿠로스도 중요한 교의(Principal Doctrines)에서, 영혼도 물질적
    원자들로 구성되어 있으며 죽음 후에는 흩어진다고 보았다. 철학을 죽음의 연습으로 정의하는 것은 이러한 비형이상학적 관점에서는 근거를 잃는다.
  keywords:
