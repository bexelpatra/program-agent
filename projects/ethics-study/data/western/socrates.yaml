- id: socrates-claim-007
  thinker_id: socrates
  work_id: socrates-crito
  source_detail: 크리톤 50a-54d
  claim: 국가의 법률과 시민 사이에는 합의가 있으며, 이를 따라야 한다
  original_text: ''
  explanation: '소크라테스는 ''법률의 의인화'' 논변을 통해, 시민은 국가의 법률 아래에서 태어나고 양육되었으므로 법률과 일종의 합의
    관계에 있다고 주장한다. 법이 부당하다고 생각하면 설득을 통해 바꾸거나 떠나야 하지만, 머물면서 법을 어기는 것은 합의를 위반하는 것이라고
    논한다. (주의: 이것은 흔히 ''악법도 법이다''로 요약되지만, 원문에서 소크라테스는 그러한 표현을 직접 사용하지 않으며, 실제 논변은 더
    복잡하다.)'
  context: 사형 판결 후 탈옥을 권유하는 크리톤에게, 소크라테스가 법률(노모이)을 의인화하여 자신이 왜 탈옥할 수 없는지를 설명하는 장면.
  argument: 시민은 국가 안에서 태어나 교육받고 법률의 혜택을 받아왔다. 이로써 시민은 법률과 묵시적 합의를 맺은 것이다. 소크라테스는 '법률'을
    의인화하여 말하게 한다. 법이 마음에 들지 않으면 설득을 통해 바꾸거나 국가를 떠나야 한다. 그러나 70년 동안 아테네에 머물며 법률의 혜택을
    누린 소크라테스가 지금 판결이 불만스럽다는 이유로 탈출하는 것은 이 합의를 일방적으로 파기하는 것이다. 또한 탈출은 소크라테스가 평생 지켜온
    '불의를 행하지 않는다'는 원칙에도 위배된다. 법률에 설득되거나 설득하거나, 둘 중 하나만이 정의로운 길이다.
  counterpoint: 이 논변은 국가가 제공하는 혜택과 법 준수 의무를 지나치게 단순하게 동일시하는 데 약점이 있다. 존 롤스는 정의론(A
    Theory of Justice, 1971)에서, 기본적 자유를 침해하는 심각하게 부정의한 법에 대해서는 시민 불복종이 정당화될 수 있다고
    논했다. 또한 이 논리는 권위주의 체제 하에서도 복종을 강요하는 데 악용될 수 있다. 소크라테스의 재판 자체가 민주적 절차를 빌린 정치적 박해였다면,
    그 판결에 따를 도덕적 의무가 있는지는 별도로 검토되어야 한다.
  keywords:
