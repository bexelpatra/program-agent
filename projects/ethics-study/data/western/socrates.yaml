thinker:
  id: socrates
  name: 소크라테스
  name_en: Socrates
  field: western_ethics
  era: 고대 그리스
  birth_year: -470
  death_year: -399
  background: '아테네의 석공(전통적 전승에 따르면) 소프로니스코스의 아들로 태어났다. 델포이 신전의 무녀(피티아)가 "소크라테스보다 지혜로운
    자는 없다"는 신탁을 내렸고, 이를 이해하기 위해 지혜롭다고 알려진 사람들을 찾아다니며 문답을 시작했다. 기원전 399년 "신을 믿지 않고
    청년을 타락시킨다"는 혐의로 고발되어 재판을 받았으며, 독배(헴록)를 마시고 사망했다. 펠로폰네소스 전쟁 시기를 살았으며, 아테네 민주정의
    혼란기를 경험했다.

    '
  core_philosophy: '소크라테스는 자연철학에서 벗어나 인간의 영혼과 덕의 문제에 집중한 최초의 철학자이다. "너 자신을 알라"는 정신에
    따라 무지의 자각을 지혜의 출발점으로 보았고, 덕(아레테)은 곧 지식이라는 주지주의적 입장을 취했다. 문답법(엘렌코스)을 통해 상대방의 무지를
    드러내고 진리를 함께 탐구하는 방법을 사용했으며, 영혼을 돌보는 것이 인간의 가장 중요한 과제라고 주장했다.

    '
  philosophical_journey: '초기에는 자연철학(피시스)에 관심을 가졌으나, 아낙사고라스의 저서에 실망한 후 인간의 영혼과 윤리 문제로
    관심을 전환했다. 델포이 신탁을 계기로 아테네 시민들과의 문답을 통해 무지의 자각과 덕의 탐구를 평생의 과업으로 삼았다.

    '
  keywords:
  - 무지의 지
  - 산파술
  - 지행합일
  - 영혼 돌봄
  - 문답법
  - 다이몬
  - 주지주의
works:
- id: socrates-apologia
  thinker_id: socrates
  title: 소크라테스의 변론
  title_original: Apologia Sokratous
  year: -397
  significance: '소크라테스의 재판 변론을 기록한 대화편. 소크라테스의 철학적 사명, 무지의 자각, 영혼 돌봄, "살펴보지 않는 삶은
    살 가치가 없다"는 핵심 사상이 직접적으로 표현되어 있다.

    '
  key_concepts:
  - 무지의 지
  - 영혼 돌봄
  - 철학적 사명
  - 살펴보지 않는 삶
- id: socrates-crito
  thinker_id: socrates
  title: 크리톤
  title_original: Kriton
  year: -395
  significance: '소크라테스가 감옥에서 탈출을 권유하는 크리톤과 나눈 대화. 법과 정의에 대한 소크라테스의 입장, 국가(법률)와 시민의
    관계, 불의를 당하더라도 불의로 대응해서는 안 된다는 원칙이 제시된다.

    '
  key_concepts:
  - 준법
  - 불의에 불의로 대응하지 않음
  - 국가와 시민의 관계
- id: socrates-meno
  thinker_id: socrates
  title: 메논
  title_original: Menon
  year: -385
  significance: '덕이 가르칠 수 있는 것인지를 탐구하는 대화편. 상기설(아남네시스), 덕과 지식의 관계, 올바른 의견과 지식의 구분이
    논의된다.

    '
  key_concepts:
  - 상기설
  - 덕과 지식
  - 올바른 의견
- id: socrates-protagoras
  thinker_id: socrates
  title: 프로타고라스
  title_original: Protagoras
  year: -385
  significance: '소피스트 프로타고라스와의 대화를 통해 덕의 통일성과 덕이 지식인지를 논한다. "아무도 자발적으로 악을 행하지 않는다"는
    소크라테스의 주지주의적 핵심 테제가 제시된다.

    '
  key_concepts:
  - 덕은 지식이다
  - 덕의 통일성
  - 자발적 악행 불가
- id: socrates-theaetetus
  thinker_id: socrates
  title: 테아이테토스
  title_original: Theaitetos
  year: -369
  significance: '지식이란 무엇인지를 탐구하는 대화편. 소크라테스가 자신의 방법을 산파술(마이유틱)에 비유하는 대목이 나온다.

    '
  key_concepts:
  - 산파술
  - 지식의 정의
- id: socrates-phaedo
  thinker_id: socrates
  title: 파이돈
  title_original: Phaidon
  year: -360
  significance: '소크라테스의 마지막 날을 기록한 대화편. 영혼의 불멸성에 대한 논증과 철학이 죽음의 연습이라는 사상, 영혼과 육체의
    관계가 논의된다. 다만 이데아론 등 플라톤 고유의 사상이 혼재되어 있어 소크라테스 본인의 사상과 플라톤의 사상을 구분하는 데 주의가 필요하다.

    '
  key_concepts:
  - 영혼 불멸
  - 영혼 돌봄
  - 철학은 죽음의 연습
claims:
- id: socrates-claim-001
  thinker_id: socrates
  work_id: socrates-apologia
  source_detail: 변론 21a-23b
  claim: 나는 내가 모른다는 것을 안다 (무지의 지)
  original_text: ''
  explanation: 델포이 신탁을 확인하기 위해 지혜롭다고 알려진 정치가, 시인, 장인들을 찾아다닌 결과, 그들은 모르면서 안다고 생각하지만
    소크라테스 자신은 모르는 것을 모른다고 자각한다는 점에서 한 가지 더 지혜롭다고 결론짓는다.
  context: 카이레폰이 델포이 신전에서 "소크라테스보다 지혜로운 자가 있는가"를 물었고, 신탁은 없다고 답했다. 소크라테스는 이 신탁의 의미를
    탐구하기 위해 여러 사람들과 문답을 시작했다.
  argument: 신탁은 소크라테스가 가장 지혜롭다고 말했지만, 소크라테스 자신은 어떤 특별한 지식도 갖고 있지 않다고 느꼈다. 이 역설을 해결하기
    위해 그는 지혜롭다고 알려진 사람들—정치가, 시인, 장인—을 차례로 찾아가 문답을 나누었다. 탐구 결과, 정치가들은 정치와 도덕에 대해 아는
    척하지만 실제로는 알지 못했고, 시인들은 아름다운 시를 쓰지만 그 의미를 설명하지 못했으며, 장인들은 자신의 기술에 대해서는 알지만 그 지식을
    넘어 다른 중요한 것까지 안다고 착각했다. 이들 모두 모르는 것을 안다고 믿는다는 공통점이 있었다. 반면 소크라테스 자신은 모르는 것에 대해
    안다고 착각하지 않는다. 이 한 가지 점에서 그는 그들보다 더 지혜롭다. 신탁의 참뜻은 인간의 지혜란 사실 별것이 아니며, 신만이 진정으로
    지혜롭고, 인간에게는 자신의 무지를 자각하는 것이 곧 참된 지혜의 출발점이라는 것이다.
  counterpoint: 아리스토텔레스는 무지의 자각을 지혜의 출발점으로 인정하면서도, 그것만으로는 적극적 지식과 덕의 형성에 충분하지 않다고
    보았다(니코마코스 윤리학 제2권). 또한 일부 해석자들은 소크라테스의 무지 주장이 수사적 아이러니(에이로네이아)이며, 실제로 그는 도덕적 지식을
    상당히 갖고 있었다고 지적한다. 플라톤 자신도 후기 대화편에서 소크라테스의 무지를 곧이곧대로 받아들이지 않고 이데아론을 통해 긍정적 지식 체계를
    구축했다.
  keywords:
  - 무지의 지
  - 델포이 신탁
  verified: false
  verification_log: []
- id: socrates-claim-002
  thinker_id: socrates
  work_id: socrates-apologia
  source_detail: 변론 38a
  claim: 살펴보지 않는 삶은 살 가치가 없다
  original_text: ''
  explanation: 소크라테스는 유죄 판결 후 형량 결정 변론에서도 자신의 철학적 삶을 포기하지 않겠다고 선언하며, 끊임없이 자기 자신과 타인의
    삶을 검토하고 살펴보는 것이 인간다운 삶의 핵심이라고 주장한다.
  context: 유죄 판결 후 형량 결정 변론에서 한 발언. 추방이나 침묵을 조건으로 풀어주겠다는 가상적 상정을 거부하며 한 말이다.
  argument: 인간은 단순히 생존하는 것이 아니라 어떻게 살아야 하는지를 끊임없이 물어야 하는 존재다. 덕이 무엇인지, 선이 무엇인지 탐구하지
    않고 사는 것은 동물적 삶과 다르지 않다. 소크라테스는 유죄 판결 후에도 철학적 탐구를 포기하는 대가로 목숨을 구하는 것을 거부했다. 만약
    신이 침묵을 조건으로 풀어준다고 해도, 그는 신에게 복종하기보다 철학에 복종하는 것이 자신의 의무라고 말한다. 삶의 가치는 그 길이에 있지
    않고, 올바르게 살펴보고 반성하며 사는 데 있다. 덕과 진리를 추구하지 않는 삶은 아무리 오래 살더라도 인간다운 삶이라 할 수 없다.
  counterpoint: 이 주장은 지적 탐구의 능력과 여유가 있는 사람을 전제한다는 비판이 있다. 생계를 위해 일해야 하는 사람들, 반성적 삶을
    영위할 교육과 여건이 없는 사람들의 삶은 가치 없는 것인가라는 문제가 제기된다. 마르크스는 독일 이데올로기(1846)에서, 철학적 자기 반성은
    물질적 조건이 충족된 소수의 특권이며, 관조적 삶의 이상 자체가 노동하는 대중을 배제하는 계급적 이상임을 비판했다. 또한 키르케고르는 불안의
    개념(1844)에서, 삶을 지속적으로 살펴보는 것이 오히려 실존적 불안과 절망을 심화시킬 수 있다고 경고했다.
  keywords:
  - 살펴보는 삶
  - 철학적 삶
  verified: false
  verification_log: []
- id: socrates-claim-003
  thinker_id: socrates
  work_id: socrates-apologia
  source_detail: 변론 29d-30b
  claim: 영혼을 돌보는 것이 가장 중요하다
  original_text: ''
  explanation: 소크라테스는 돈, 명예, 평판보다 영혼이 최선의 상태가 되도록 돌보는 것이 가장 중요하다고 아테네 시민들에게 권고한다.
    진리와 지혜, 영혼의 개선에 관심을 가져야 한다고 역설한다.
  context: 재판 변론 중 아테네 시민들에게 던지는 권고의 형태로 제시된다. 이것이 소크라테스가 신으로부터 부여받은 사명이라고 말한다.
  argument: 인간이 지닌 것 중 가장 중요한 것은 영혼이다. 재물과 신체, 평판은 모두 외적인 것으로 상황에 따라 잃을 수 있다. 반면 영혼의
    덕—용기, 지혜, 절제, 정의—은 자신이 노력하여 기를 수 있는 것이며, 이것이야말로 진정으로 자신의 것이다. 소크라테스는 신으로부터 아테네
    시민들의 영혼을 일깨우는 사명을 부여받았다고 말하며, 재물을 쌓는 것보다 영혼을 최선의 상태로 유지하는 것을 권고한다. 영혼이 최선의 상태—덕을
    갖춘 상태—에 있을 때 인간은 참된 행복(에우다이모니아)에 도달할 수 있다. 따라서 다른 모든 것보다 영혼을 돌보는 일을 최우선으로 삼아야
    한다.
  counterpoint: 에피쿠로스 학파는 영혼의 평온함(아타락시아)이 중요하다고 인정하면서도, 소크라테스처럼 영혼의 덕만을 절대시하는 입장은
    물질적 조건의 중요성을 간과한다고 비판했다. 에피쿠로스는 행복론(Kyriai Doxai)에서 신체적 쾌락과 고통의 부재가 행복의 필수 조건이라고
    논했다. 또한 아리스토텔레스는 니코마코스 윤리학 제1권에서 에우다이모니아를 위해 덕 외에도 외적 재화—건강, 우정, 물질적 풍요—가 필요하다고
    보았으며, 영혼만을 돌보는 소크라테스의 입장이 인간의 복합적 본성을 무시한다고 비판할 수 있다.
  keywords:
  - 영혼 돌봄
  - 덕
  verified: false
  verification_log: []
- id: socrates-claim-004
  thinker_id: socrates
  work_id: socrates-protagoras
  source_detail: 프로타고라스 352b-358d
  claim: 덕은 지식이다 (지행합일) — 아무도 자발적으로 악을 행하지 않는다
  original_text: ''
  explanation: 소크라테스는 악행은 무지에서 비롯된다고 주장한다. 선이 무엇인지 진정으로 아는 사람은 반드시 선을 행하게 되며, 악을 행하는
    것은 선에 대한 무지 때문이라는 주지주의적 입장을 제시한다. 쾌락에 지배당해 악을 행한다는 통념을 반박하며, 이는 단지 좋음과 나쁨에 대한
    측정(계산)의 실패, 즉 무지일 뿐이라고 논증한다.
  context: 프로타고라스와의 대화에서 '쾌락에 의한 지배(akrasia)'가 가능한지를 논하는 맥락. 대중의 통념은 쾌락에 지배당해 나쁜 것을
    안다고 하면서도 행한다고 보지만, 소크라테스는 이를 부정한다.
  argument: 아무도 자발적으로 자신에게 나쁜 것을 선택하지 않는다. 모든 행위자는 자신이 좋다고 판단하는 것을 선택한다. 나쁜 행동을 하는
    사람은 그것이 실제로 나쁘다는 사실을 제대로 알지 못하기 때문에 그렇게 행동한다. 소크라테스는 쾌락에 지배당해 악을 행한다는 통념을 분석한다.
    그 통념에 따르면 사람들이 장기적으로 더 나쁜 것임을 알면서도 당장의 쾌락 때문에 그것을 선택한다는 것인데, 이는 자기모순이다. 실제로 그런
    사람은 단지 미래의 결과와 현재의 쾌락 사이의 상대적 크기를 잘못 측정한 것—즉 계산 능력의 실패, 곧 무지—에 불과하다. 진정으로 선이 무엇인지,
    어떤 행위가 장기적으로 더 좋은지를 아는 사람은 필연적으로 선을 행한다. 따라서 덕은 곧 지식이며, 악덕은 곧 무지다.
  counterpoint: 아리스토텔레스는 니코마코스 윤리학 제7권에서 아크라시아(의지의 나약함)가 실재한다고 반박했다. 옳은 것을 알면서도 욕구나
    감정에 의해 그것을 행하지 못하는 사례는 일상에서 흔히 관찰된다. 아리스토텔레스에 따르면 아크라시아 상태에서 사람은 보편적 지식은 갖고 있지만
    특수한 상황에서 그것을 적용하는 실천적 지식(phronesis)이 욕구에 의해 일시적으로 압도된다. 이는 소크라테스의 주지주의가 인간의 실제
    심리적 구조를 설명하지 못한다는 것을 보여준다.
