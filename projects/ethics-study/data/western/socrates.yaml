- id: socrates-claim-005
  thinker_id: socrates
  work_id: socrates-meno
  source_detail: 메논 87c-89a
  claim: 덕이 지식이라면 덕은 가르칠 수 있어야 한다
  original_text: ''
  explanation: 메논과의 대화에서 소크라테스는 덕이 지식이라면 가르칠 수 있어야 하지만, 실제로 덕의 교사가 존재하지 않는다는 역설적 상황을
    탐구한다. 이 과정에서 지식과 올바른 의견(doxa)의 구분이 논의되며, 상기설을 통해 배움은 영혼이 이미 알고 있는 것을 상기하는 과정이라고
    제시한다.
  context: 메논이 "덕은 가르칠 수 있는 것인가?"라는 질문을 제기하면서 시작되는 탐구.
  argument: 덕이 지식이라면, 다른 기술적 지식—수학, 의학, 항해술—처럼 가르칠 수 있어야 한다. 그런데 아테네에서 덕을 전문적으로 가르치는
    교사(디다스칼로스)가 없고, 훌륭하기로 이름난 아버지들—테미스토클레스, 페리클레스—도 자녀에게 덕을 전수하는 데 실패했다. 만약 덕이 단순히
    전달 가능한 명제적 지식이라면 이런 실패는 설명되지 않는다. 소크라테스는 상기설(아나므네시스)을 통해 대안을 제시한다. 진정한 앎은 외부에서
    주입되는 것이 아니라 영혼이 전생에서 이미 획득한 것을 이 세상에서 다시 떠올리는 과정이다. 따라서 덕의 학습은 올바른 의견을 스스로 상기하는
    것이며, 교사의 역할은 이 과정을 촉진하는 것이다. 그렇다면 덕은 단순히 가르쳐지는 것이 아니라 신적 은총(테이아 모이라)으로 부여된 것이기도
    하다.
  counterpoint: 이 논변은 소크라테스 자신의 입장 내에서도 긴장을 내포한다. 덕이 지식이라고 하면서도 가르칠 수 없다고 하면, 소크라테스
    자신의 철학적 활동은 무엇인가라는 문제가 생긴다. 또한 상기설 자체가 영혼 불멸과 전생을 전제하는 형이상학적 가정 위에 서 있다. 아리스토텔레스는
    니코마코스 윤리학 제2권에서 덕은 타고나는 것도 아니고 단순히 알려주는 것도 아니라, 반복된 실천(에토스)을 통해 습관으로 형성되는 것이라고
    반박했다. 이는 상기설적 전제 없이 덕의 획득을 설명하는 대안 이론이다.
