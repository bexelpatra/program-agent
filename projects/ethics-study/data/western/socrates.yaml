- id: socrates-claim-006
  thinker_id: socrates
  work_id: socrates-crito
  source_detail: 크리톤 49a-49e
  claim: 불의를 당하더라도 불의로 대응해서는 안 된다
  original_text: ''
  explanation: 소크라테스는 어떤 경우에도 불의를 행해서는 안 되며, 불의를 당했다고 해서 불의로 보복하는 것 역시 정의롭지 않다고 주장한다.
    해를 입었다고 해서 해로 갚는 것은 결코 정당화될 수 없다고 역설한다.
  context: 크리톤이 감옥을 탈출하라고 권유하는 상황에서, 소크라테스가 탈출을 거부하며 제시하는 윤리적 원칙. 다수의 의견이 아니라 정의에
    대한 전문가의 판단을 따라야 한다고 먼저 확인한 후 이 원칙을 도출한다.
  argument: 불의를 행하는 것은 어떤 경우에도 나쁜 것이다. 불의는 행하는 자의 영혼을 해치기 때문이다. 보복으로서의 불의도 마찬가지로 나쁘다.
    상대가 나에게 해를 끼쳤다고 해서 내가 해로 갚는 것은 결국 내가 스스로 불의를 행하는 것이 된다. 당하는 자에게 해를 끼치는 것은 옳지 않다는
    것은 다수도 인정하는 원칙이다. '눈에는 눈'의 원리는 대중적 통념이지만, 이는 결국 불의를 행하는 것이며 소크라테스는 이를 받아들일 수 없다.
    아무리 억울한 판결을 받았더라도 탈출(법률 위반)로 대응하는 것은 스스로 불의를 행하는 것이다. 덕 있는 삶의 핵심은 어떤 상황에서도 불의를
    행하지 않는 데 있다.
  counterpoint: 이 원칙은 극단적 상황에서 자기 방어나 저항을 사실상 불가능하게 만든다는 비판이 있다. 존 스튜어트 밀은 공리주의(1863)에서,
    행위의 도덕성은 행위자의 원칙이 아니라 그것이 가져오는 결과의 총체적 유용성으로 판단해야 한다고 논했다. 따라서 더 큰 선을 위해 불의에 불의로
    대응하는 것이 정당화될 수 있다. 또한 헨리 데이비드 소로는 시민 불복종(Civil Disobedience, 1849)에서, 부당한 법에 대한
    적극적 불복종이 오히려 더 높은 도덕적 원칙에 충실한 행위임을 주장했다. 소크라테스의 논리는 체제에 의한 부당한 처형까지도 순순히 수용하게
    만드는 위험성을 내포한다.
  keywords:
