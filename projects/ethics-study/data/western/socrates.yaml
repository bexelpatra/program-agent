  term: 산파술
  term_en: Maieutics
  definition: '소크라테스가 사용한 문답의 방법. 자신의 어머니가 산파였던 것에 비유하여, 자신은 지혜를 직접 낳지 못하지만 질문을 통해
    상대방의 영혼에서 진리를 이끌어내는 역할을 한다고 설명했다.

    '
