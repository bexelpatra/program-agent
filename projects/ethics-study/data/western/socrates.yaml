  source_detail: 변론 31c-31d
  claim: 다이몬의 신호 — 내면의 신적 징표가 잘못된 행위를 제지한다
  original_text: ''
  explanation: 소크라테스는 어릴 때부터 자신에게 신적인 어떤 것(다이모니온)의 소리가 들렸다고 말한다. 이 징표는 소크라테스가 어떤 것을
    하려 할 때 이를 만류하는 방식으로 작용하며, 무엇을 하라고 적극적으로 지시하지는 않는다.
  context: 재판 변론 중 자신이 왜 정치에 참여하지 않았는지를 설명하면서 다이몬에 대해 언급한다.
  argument: 소크라테스는 어릴 때부터 신적 징표(다이모니온)의 목소리를 경험했다. 이 목소리는 그가 어떤 잘못된 행동을 하려 할 때 이를
    만류하는 방식으로 작용했으며, 무엇을 하라고 적극적으로 지시하는 것이 아니라 잘못된 일을 하려 할 때 반드시 제지하는 방식으로만 작용했다.
    소크라테스는 만약 정치에 참여했다면 불의에 맞서다 훨씬 일찍 죽었을 것이라고 말한다—이때 다이몬이 정치 참여를 만류했을 것이기 때문이다. 다이모니온은
    단순한 이성적 판단이 아니라 신적 안내로서, 소크라테스의 사명—아테네 시민들의 영혼을 일깨우는 일—을 보호하는 기능을 한다. 이는 소크라테스가
    신의 명에 따라 살고 있다는 자의식과 연결된다.
  counterpoint: 다이모니온 주장은 소크라테스가 기소된 '신을 믿지 않는다'는 혐의와 역설적으로 연결된다. 즉, 그는 전통적 신들은 믿지
    않으면서 자신에게만 작용하는 신적 징표를 주장했다. 플라톤의 제자 크세노크라테스는 다이몬을 영혼의 이성적 부분으로 해석하려 했으나, 소크라테스
    자신이 그것을 신적인 것으로 귀속시킨 점은 그의 주지주의—덕은 이성적 지식이다—와 긴장 관계를 형성한다. 합리주의적 관점에서, 내면의 신적
    징표를 도덕적 판단의 근거로 삼는 것은 이성적 논증 대신 신탁적 권위에 의존하는 비합리적 요소이며, 이는 칸트가 도덕 형이상학 기초(Grundlegung,
    1785)에서 요구한 이성의 자율성 원칙과 상충한다.
  keywords:
  - 다이몬
  - 다이모니온
