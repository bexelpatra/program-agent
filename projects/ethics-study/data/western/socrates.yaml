  term_en: Care of the soul
  definition: '소크라테스가 가장 중요하게 여긴 과제. 돈, 명예, 평판보다 영혼이 최선의 상태가 되도록 돌보는 것이 우선이라고 주장했다.
    영혼의 덕을 기르는 것이 인간의 참된 행복(에우다이모니아)의 조건이다.

    '
  thinker_id: socrates
  work_id: socrates-apologia
  related_terms:
