- id: augustine-two-cities
  thinker_id: augustine
  work_id: augustine-de-civitate-dei
  source_detail: De Civitate Dei 제14권 28장; 제15권 1~4장
  claim: 역사는 신의 도성(Civitas Dei)과 지상의 도성(Civitas Terrena), 두 도성의 투쟁으로 이루어진다
  original_text: 'Fecerunt itaque civitates duas amores duo: terrenam scilicet amor
    sui usque ad contemptum Dei, caelestem vero amor Dei usque ad contemptum sui'
  explanation: 두 도성은 지리적 국가가 아니라 사랑의 방향으로 구별된다. 신의 도성은 신에 대한 사랑으로, 지상의 도성은 자기 자신에
    대한 사랑으로 세워진다. 지상의 국가와 교회가 각 도성과 일치하지는 않는다. 로마도 교회도 이 두 도성이 섞여 있다. 역사의 종말에 최후 심판으로
    두 도성이 완전히 분리된다.
  argument: '전제1: 모든 인간의 행위는 사랑(amor)에서 나온다. 전제2: 사랑의 방향은 신을 향하거나(ordo amoris 실현)
    자기 자신을 향하거나(ordo amoris 전도) 둘 중 하나다. 전제3: 신을 향한 사랑으로 묶인 공동체가 신의 도성이고, 자기 사랑으로
    묶인 공동체가 지상의 도성이다. 결론: 현세 역사는 이 두 도성이 혼재하는 순례의 시간이며, 최후 심판에서 완전히 분리된다.'
  counterpoint: 오로시우스(Paulus Orosius)는 이교도들을 반박하는 역사(Historiarum Adversum Paganos,
    418년)에서 아우구스티누스의 역사관을 이어받아 기독교 제국 로마를 신의 도성과 동일시하는 방향으로 단순화했으나, 아우구스티누스 자신은 지상의
    어떤 국가도 신의 도성과 동일시하는 것을 거부했다.
  context: 서고트족의 로마 약탈(410년) 이후 로마 함락이 기독교 때문이라는 이교도들의 비난에 맞서, 기독교적 역사 해석과 국가론을 제시하기
    위해 집필되었다.
