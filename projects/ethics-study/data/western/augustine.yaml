- id: augustine-privatio-boni
  thinker_id: augustine
  work_id: augustine-de-libero-arbitrio
  source_detail: De Libero Arbitrio, 제2~3권; Confessiones 제7권 12장
  claim: 악은 독립적 실체가 아니라 선의 결핍(privatio boni)이다
  original_text: Neque enim malum aliqua substantia est, sed privatio boni [아우구스티누스
    사상의 학계 통용 요약 정식화; cf. Confessiones 7.12, De Civitate Dei 11.9]
  explanation: 아우구스티누스는 마니교의 이원론(선과 악이 동등한 두 실체)을 거부하고, 신플라톤주의에서 배운 통찰을 기독교 신학에 접목했다.
    악은 그 자체로 존재하는 실체가 아니라 존재해야 할 선이 결여된 상태다. 마치 어둠이 빛의 부재이듯, 악은 선의 부재다.
  argument: '전제1: 신은 모든 것을 선하게 창조했다. 전제2: 신이 창조한 것은 선하다는 점에서 존재이고, 악은 그것의 결여이다. 전제3:
    결여는 실체가 아니라 실체의 부족함(결핍)이다. 결론: 따라서 악은 독립적 실체가 없고, 선이 있어야 할 자리에 선이 없는 상태(privatio
    boni)에 불과하다.'
  counterpoint: 마니교도들은 악의 실체성을 주장하며 아우구스티누스의 결핍이론이 악의 현실적 파괴력을 과소평가한다고 비판했다. 토마스 아퀴나스는
    신학대전(Summa Theologiae I, q.48)에서 결핍이론을 수용하면서도, 악이 '인과적 힘'을 가질 수 있는지를 보다 정밀하게 분석했다.
