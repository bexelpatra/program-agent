- id: augustine-time-theory
  thinker_id: augustine
  work_id: augustine-confessiones
  source_detail: Confessiones 제11권 14~28장
  claim: 시간은 객관적 외부 질서가 아니라 영혼의 연장(distentio animi)이며, 과거·현재·미래는 모두 현재 안에 존재한다
  original_text: 'inde mihi visum est nihil esse aliud tempus quam distentionem; sed
    cuius rei, nescio, et mirum si non ipsius animi [축약형: distentio animi; Conf. XI.26.33]'
  explanation: 아우구스티누스는 '시간이란 무엇인가? 아무도 묻지 않으면 나는 알지만, 설명하려 하면 모른다'는 유명한 말로 시간의 역설을
    제시한다. 과거는 더 이상 없고 미래는 아직 없으니, 엄밀히 말하면 존재하는 것은 현재뿐이다. 그러나 우리는 과거(기억)·현재(주의)·미래(기대)를
    현재의 영혼 안에서 동시에 경험한다. 시간은 외부 사물의 속성이 아니라 영혼의 연장이다.
  argument: '전제1: 과거는 이미 사라졌고 미래는 아직 없으므로, 엄밀히 존재하는 것은 현재뿐이다. 전제2: 그러나 우리는 과거를 기억(memoria)으로,
    미래를 기대(expectatio)로, 현재를 주의(contuitus)로 경험한다. 전제3: 이 세 가지는 모두 영혼의 현재적 작용이다. 결론:
    시간은 외부 세계에 있는 것이 아니라 영혼(animus) 안에 있으며, 시간의 길이는 영혼의 연장(distentio animi)이다.'
  counterpoint: 아리스토텔레스는 자연학(Physica 제4권 10~14장)에서 시간을 운동의 수(numerus motus)로 정의하며
    시간이 외부 자연 세계의 속성이라고 보았다. 이에 비해 아우구스티누스는 시간을 내면화하여 주관적·심리적 시간론을 제시했다는 차이가 있다.
  context: 신에게 기도하는 형식으로 쓰인 고백록 제11권에서, 창조 이전에 신이 무엇을 하고 있었는가라는 질문에 답하면서 시간의 본질을 탐구한다.
