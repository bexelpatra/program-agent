# Reverse proxy in front of gunicorn/uvicorn (FastAPI).
# Logs go to stdout/stderr so `docker compose logs` shows them.
server {
    listen 80;
    server_name _;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    # Allow reasonably large uploads (not used heavily today, future-proofing).
    client_max_body_size 20m;

    # Serve static assets directly from the mounted volume (fast, no Python).
    location /static/ {
        alias /usr/share/nginx/static/;
        expires 7d;
        access_log off;
    }

    # Everything else -> gunicorn app (service name `app` resolves via compose DNS).
    location / {
        proxy_pass http://app:8000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Stream audio (Range) and SSE-ish responses without buffering.
        proxy_buffering         off;
        proxy_request_buffering off;

        # Ollama lookups can take a while on first call — give the app room.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
