name: abc_english_app
description: "ABC English learning mobile app"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # Audio
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.13

  # Local storage (drift + sqlite3 bindings)
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Logging
  logger: ^2.4.0

  # Hashing (manifest checksum)
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.20.0
  riverpod_generator: ^2.4.3
  mocktail: ^1.0.4

  # Test-only: direct access to `package:sqlite3/open.dart` so that unit
  # tests running on desktop Linux CI can point drift at the versioned
  # `libsqlite3.so.0` (no unversioned `.so` ships there).
  sqlite3: ^2.9.4

flutter:
  uses-material-design: true
